<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  :root { --bg:#fff; --fg:#1e1e1e; --muted:#6b7280; --border:#e5e7eb; --accent:#3b82f6; }
  * { box-sizing: border-box; }
  body { margin:0; font:12px/1.5 Inter, -apple-system, sans-serif; color:var(--fg); padding:16px; }
  h1 { font-size:13px; margin:0 0 2px; }
  p.sub { margin:0 0 12px; color:var(--muted); }
  textarea {
    width:100%; height:300px; resize:vertical; padding:10px; border:1px solid var(--border);
    border-radius:8px; font:11px/1.45 ui-monospace, SFMono-Regular, Menlo, monospace; color:var(--fg);
  }
  textarea:focus { outline:none; border-color:var(--accent); }
  .row { display:flex; gap:8px; margin-top:10px; }
  button {
    flex:1; padding:9px 12px; border-radius:8px; border:1px solid var(--border); background:#fff;
    font-weight:600; font-size:12px; cursor:pointer;
  }
  button.primary { background:var(--accent); border-color:var(--accent); color:#fff; }
  button:hover { filter:brightness(0.97); }
  .secondary-row { display:flex; gap:8px; margin-top:8px; }
  .secondary-row button { font-weight:500; color:var(--muted); }
  #err { color:#dc2626; margin-top:8px; min-height:14px; }
  input[type=file] { display:none; }
</style>
</head>
<body>
  <h1>Learning Canvas Importer</h1>
  <p class="sub">Paste your Co-pilot JSON, or load a file / the sample, then Generate.</p>

  <textarea id="json" placeholder='{ "projectSnapshot": ["..."], "problems": { "customers": ["..."] } }'></textarea>

  <div class="secondary-row">
    <button id="sample">Load sample</button>
    <button id="upload">Upload .json</button>
    <input type="file" id="file" accept=".json,application/json" />
  </div>

  <div class="row">
    <button id="cancel">Close</button>
    <button id="generate" class="primary">Generate canvas</button>
  </div>

  <div id="err"></div>

<script>
  // Minimal demo payload — shows fixed sections, nesting, item metadata, and an extra section.
  const SAMPLE = {
    projectSnapshot: [
      "Self-serve onboarding for SMB accounts",
      { text: "Target launch: Q4", owner: "Priya", confidence: "high" }
    ],
    problems: {
      customers: ["Setup takes 40+ min", { text: "Users abandon at billing step", source: "analytics" }],
      business: ["High support load from onboarding tickets"]
    },
    opportunities: {
      customers: ["Cut time-to-value to under 10 min"],
      business: [{ text: "Reduce support cost ~20%", confidence: "medium" }]
    },
    successMetrics: ["Activation rate +15%", "Onboarding completion > 70%"],
    requirements: ["Guided setup wizard", "Skip + resume later"],
    users: ["SMB owners, non-technical", "Ops admins"],
    hypotheses: [{ text: "A wizard lifts activation", confidence: "medium", owner: "Dave" }],
    solutions: {
      currentState: ["Manual setup doc + email"],
      competitorAnalysis: [{ text: "Competitor X has 5-step wizard", source: "research" }]
    },
    insights: {
      dataFeedback: [{ text: "30% drop-off at step 3", source: "amplitude" }],
      research: [{ text: "Users want progress visibility", source: "UX interviews" }]
    },
    constraints: {
      risks: ["Billing API rate limits"],
      assumptions: ["Most users on desktop"],
      issues: ["Legacy accounts lack profile data"],
      dependencies: ["Payments team API"]
    },
    collaborations: {
      overlaps: ["Growth team's referral work"],
      partnerships: ["Payments squad"],
      forums: ["Weekly onboarding sync"]
    },
    useCases: ["First-time SMB signup", "Re-onboarding after plan change"],
    okrs: ["O: Best-in-class onboarding", "KR: Activation 55% → 70%"],
    extra: [
      { title: "Open Questions", items: ["Do we gate on payment?", "Mobile onboarding scope?"] }
    ]
  };

  const ta = document.getElementById('json');
  const err = document.getElementById('err');

  document.getElementById('sample').onclick = () => { ta.value = JSON.stringify(SAMPLE, null, 2); err.textContent = ''; };
  document.getElementById('upload').onclick = () => document.getElementById('file').click();
  document.getElementById('file').onchange = (e) => {
    const f = e.target.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = () => { ta.value = r.result; err.textContent = ''; };
    r.readAsText(f);
  };
  document.getElementById('cancel').onclick = () => parent.postMessage({ pluginMessage: { type: 'cancel' } }, '*');
  document.getElementById('generate').onclick = () => {
    err.textContent = '';
    if (!ta.value.trim()) { err.textContent = 'Paste some JSON first (or Load sample).'; return; }
    parent.postMessage({ pluginMessage: { type: 'generate', json: ta.value } }, '*');
  };

  // Surface build/parse errors from the plugin sandbox.
  onmessage = (e) => {
    const m = e.data.pluginMessage;
    if (m && m.type === 'error') err.textContent = m.message;
  };
</script>
</body>
</html>
